{% extends "base.html" %}
{% block title %}Upload · Bookcast{% endblock %}
{% block content %}
<h1 class="text-2xl font-semibold mb-6">Upload a book</h1>
{% if error %}
  <div class="rounded-md bg-rose-50 border border-rose-200 px-4 py-3 text-sm text-rose-800 mb-4">
    {{ error }}
  </div>
{% endif %}
<form method="post" action="/upload" enctype="multipart/form-data" class="space-y-4">
  <label class="block">
    <span class="text-sm font-medium text-stone-700">Book file</span>
    <input
      type="file"
      name="file"
      required
      accept="{{ supported|join(',') }}"
      class="mt-1 block w-full rounded-md border border-stone-300 px-3 py-2 bg-white"
    />
    <span class="mt-1 block text-xs text-stone-500">Supported: {{ supported|join(", ") }}</span>
  </label>
  <button
    type="submit"
    class="rounded-md bg-stone-900 text-white px-4 py-2 font-medium hover:bg-stone-800"
  >Upload &amp; parse</button>
</form>
{% endblock %}
