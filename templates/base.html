<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Bookcast{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body class="bg-stone-50 text-stone-900 min-h-screen">
  <header class="border-b border-stone-200 bg-white">
    <div class="mx-auto max-w-4xl flex items-center justify-between px-6 py-4">
      <a href="/" class="text-xl font-semibold tracking-tight">📚 Bookcast</a>
      <nav class="flex items-center gap-4 text-sm">
        <a href="/upload" class="text-stone-600 hover:text-stone-900">Upload</a>
      </nav>
    </div>
  </header>
  <main class="mx-auto max-w-4xl px-6 py-8">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
